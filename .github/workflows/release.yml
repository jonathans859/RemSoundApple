name: Release

# Publishing a GitHub Release (tag vX.Y.Z) builds a signed iOS IPA, uploads it to
# TestFlight with the release notes as the "What to Test" text, and attaches the IPA to
# the release. See plan.md for the one-time Apple setup and the required secrets:
#   APPLE_TEAM_ID, APPLE_DISTRIBUTION_CERT_P12_BASE64, APPLE_DISTRIBUTION_CERT_PASSWORD,
#   KEYCHAIN_PASSWORD, APP_STORE_CONNECT_API_KEY_ID, APP_STORE_CONNECT_API_ISSUER_ID,
#   APP_STORE_CONNECT_API_PRIVATE_KEY

on:
  release:
    types: [published]

permissions:
  contents: write # gh release upload

jobs:
  test:
    name: RemSoundKit unit tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Run tests
        run: swift test --package-path RemSoundKit

  release-ios:
    name: Signed iOS build → TestFlight + release asset
    needs: test
    # App Store Connect rejects uploads not built with the iOS 26 SDK (Xcode 26+), so this
    # job must run on the macOS 26 image — NOT macos-15 (Xcode 16.4 / iOS 18.5 SDK). The
    # unsigned build.yml CI can stay on the older image; only uploads have the SDK floor.
    runs-on: macos-26
    env:
      TAG: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v5

      - name: Use the newest installed Xcode (iOS 26 SDK required for App Store uploads)
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"

      - name: Derive version numbers from the tag
        id: version
        run: |
          VERSION="${TAG#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must be vMAJOR.MINOR.PATCH (got '$TAG')"
            exit 1
          fi
          echo "marketing=$VERSION" >> "$GITHUB_OUTPUT"
          # Build numbers must only ever increase and be unique per marketing version.
          # run_number is monotonic across releases but does NOT change on a re-run —
          # the run_attempt suffix keeps a re-run unique when a previous attempt already
          # uploaded its build before failing on a later step.
          echo "build=${{ github.run_number }}.${{ github.run_attempt }}" >> "$GITHUB_OUTPUT"

      - name: Import distribution certificate into a throwaway keychain
        env:
          CERT_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/dist.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          echo -n "$CERT_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" > /dev/null
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Write App Store Connect API key
        env:
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/asc"
          printf '%s' "$API_PRIVATE_KEY" > "$RUNNER_TEMP/asc/AuthKey.p8"

      - name: Archive (signed, cloud-managed provisioning)
        run: |
          xcodebuild archive \
            -project RemSound.xcodeproj \
            -scheme RemSound-iOS \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/RemSound.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/asc/AuthKey.p8" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            MARKETING_VERSION="${{ steps.version.outputs.marketing }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build }}"

      - name: Export IPA
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>export</string>
            <key>signingStyle</key><string>automatic</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/RemSound.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/asc/AuthKey.p8" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}"
          cp "$RUNNER_TEMP"/export/*.ipa "RemSound-iOS-$TAG.ipa"

      - name: Upload to TestFlight (What to Test = release notes)
        env:
          RELEASE_NOTES: ${{ github.event.release.body }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          jq -n --arg kid "$API_KEY_ID" --arg iss "$API_ISSUER_ID" --arg key "$API_PRIVATE_KEY" \
            '{key_id: $kid, issuer_id: $iss, key: $key, duration: 1200, in_house: false}' \
            > "$RUNNER_TEMP/asc/api_key.json"
          # changelog + skip_waiting together: pilot waits only until the build APPEARS
          # in App Store Connect, sets "What to Test", then skips the rest of the
          # processing wait — still takes a few minutes, but not the full 5–15.
          if [ -n "$RELEASE_NOTES" ]; then
            fastlane pilot upload \
              --ipa "RemSound-iOS-$TAG.ipa" \
              --api_key_path "$RUNNER_TEMP/asc/api_key.json" \
              --changelog "$RELEASE_NOTES" \
              --skip_waiting_for_build_processing true
          else
            fastlane pilot upload \
              --ipa "RemSound-iOS-$TAG.ipa" \
              --api_key_path "$RUNNER_TEMP/asc/api_key.json" \
              --skip_waiting_for_build_processing true
          fi

      - name: Attach IPA to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" "RemSound-iOS-$TAG.ipa" --clobber

      - name: Delete throwaway keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" || true
