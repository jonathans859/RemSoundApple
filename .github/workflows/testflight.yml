name: TestFlight

# Every push to main builds a cloud-signed iOS IPA and a cloud-signed macOS PKG and
# uploads both to TestFlight; the internal tester group (set to automatic distribution in
# App Store Connect) receives them as soon as processing finishes, with the head commit
# subject as "What to Test". Publishing a GitHub Release (tag vX.Y.Z) additionally sets
# the release notes as "What to Test", distributes the builds to the external tester
# group(s), and attaches the IPA + PKG to the release. The first build of each marketing
# version goes through Beta App Review before external testers see it — per platform,
# and that wait is Apple-side and normal.
#
# Both platforms share ONE App Store Connect app record (universal purchase): the iOS and
# macOS targets use the same bundle id com.jonathan859.remsound, and the app record must
# have the macOS platform added (App Store Connect → RemSound → Add Platform) before the
# first macOS upload. fastlane pilot disambiguates the platforms via --app_platform.
#
# Signing is Apple *cloud signing*: automatic signing + the App Store Connect API key
# (must be role Admin) via -allowProvisioningUpdates. Apple holds the distribution
# certificate's private key; no certificate, .p12, or profile exists in this repo or its
# secrets. Required secrets:
#   APPLE_TEAM_ID, APP_STORE_CONNECT_API_KEY_ID, APP_STORE_CONNECT_API_ISSUER_ID,
#   APP_STORE_CONNECT_API_PRIVATE_KEY
# Optional repository VARIABLE (Settings → Secrets and variables → Actions → Variables):
#   TESTFLIGHT_EXTERNAL_GROUPS — comma-separated external TestFlight group names that
#   releases are distributed to (defaults to "Beta"; must match App Store Connect exactly).

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write # gh release upload

# Serialize workflow runs: parallel pilot runs against the same app record + platform
# race App Store Connect processing, and ordered uploads keep TestFlight's build list
# sensible. The iOS and macOS jobs within one run may overlap — different platforms
# process independently.
concurrency:
  group: testflight-upload
  cancel-in-progress: false

jobs:
  test:
    name: RemSoundKit unit tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Run tests
        run: swift test --package-path RemSoundKit

  testflight:
    name: Cloud-signed iOS build → TestFlight
    needs: test
    # App Store Connect rejects uploads not built with the iOS 26 SDK (Xcode 26+), so this
    # job must run on the macOS 26 image — NOT macos-15 (Xcode 16.4 / iOS 18.5 SDK). Only
    # uploads have the SDK floor; tests and unsigned CI stay on the older image.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # build numbers derive from the commit count

      - name: Use the newest installed Xcode (iOS 26 SDK required for App Store uploads)
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"

      # xcodebuild's ARCHIVE step signs with an Apple Development identity (only the
      # export re-sign is cloud-managed distribution signing), and on a throwaway runner
      # -allowProvisioningUpdates mints a brand-new Development certificate every run —
      # until the account hits Apple's certificate cap (first hit 2026-07-11, v0.3.0).
      # Persisting ONE keychain across runs lets every later run reuse the same identity:
      # new certificates are only minted on a cold cache and when the year-long
      # certificate expires. The always-unique key + restore-keys prefix means each run
      # restores the newest keychain AND saves its (possibly updated) state for the next.
      # The fixed keychain password below only guards a Development-grade key inside this
      # repo's Actions cache — it cannot distribute anything; the distribution key never
      # leaves Apple.
      - name: Reuse the CI signing keychain across runs
        uses: actions/cache@v4
        with:
          path: ~/Library/Keychains/ci-signing.keychain-db
          key: ci-signing-keychain-${{ github.run_id }}-${{ github.run_attempt }}-ios
          restore-keys: ci-signing-keychain-

      - name: Activate the CI signing keychain
        run: |
          KEYCHAIN="$HOME/Library/Keychains/ci-signing.keychain-db"
          if [ ! -f "$KEYCHAIN" ]; then
            security create-keychain -p remsound-ci "$KEYCHAIN"
          fi
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p remsound-ci "$KEYCHAIN"
          # Non-interactive codesign access to keys restored from a previous run's cache.
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k remsound-ci "$KEYCHAIN" >/dev/null 2>&1 || true
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          security default-keychain -s "$KEYCHAIN"

      - name: Derive marketing version and build number
        id: version
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${TAG#v}"
            # vX.Y.Z = NEW marketing version — its first build waits in Beta App Review
            # before external testers see it. vX.Y.Z-bN = re-release of the SAME
            # marketing version: external testers usually get it without a fresh review;
            # build-number uniqueness already comes from the commit count.
            if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-b[0-9]+)?$ ]]; then
              echo "::error::Release tag must be vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-b<N> (got '$TAG')"
              exit 1
            fi
            KIND=1
            IPA="RemSound-iOS-$TAG.ipa"
            VERSION="${VERSION%%-*}"
          else
            # Push build: ship whatever fallback version the pbxproj carries (the release
            # skill keeps it in sync with the next tag).
            VERSION=$(sed -n 's/^[[:space:]]*MARKETING_VERSION = \(.*\);$/\1/p' RemSound.xcodeproj/project.pbxproj | head -1)
            KIND=0
            IPA="RemSound-iOS-$VERSION-$(git rev-parse --short HEAD).ipa"
          fi
          # CFBundleVersion must be unique per marketing version and should only grow.
          # commit-count.kind.attempt: the commit count is monotonic on main, kind keeps
          # the push build and the release build of the SAME commit distinct (a release is
          # usually tagged on a commit that already produced a push build), and the run
          # attempt keeps a re-run unique when a previous attempt uploaded before failing.
          BUILD="$(git rev-list --count HEAD).$KIND.${{ github.run_attempt }}"
          {
            echo "marketing=$VERSION"
            echo "build=$BUILD"
            echo "ipa=$IPA"
          } >> "$GITHUB_OUTPUT"

      - name: Write App Store Connect API key
        env:
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/asc"
          printf '%s' "$API_PRIVATE_KEY" > "$RUNNER_TEMP/asc/AuthKey.p8"
          jq -n --arg kid "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
                --arg iss "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}" \
                --arg key "$API_PRIVATE_KEY" \
            '{key_id: $kid, issuer_id: $iss, key: $key, duration: 1200, in_house: false}' \
            > "$RUNNER_TEMP/asc/api_key.json"

      - name: Archive (cloud signing — Apple signs with its cloud-managed certificate)
        run: |
          xcodebuild archive \
            -project RemSound.xcodeproj \
            -scheme RemSound-iOS \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/RemSound.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/asc/AuthKey.p8" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            MARKETING_VERSION="${{ steps.version.outputs.marketing }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build }}"

      - name: Export IPA
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>export</string>
            <key>signingStyle</key><string>automatic</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/RemSound.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/asc/AuthKey.p8" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}"
          cp "$RUNNER_TEMP"/export/*.ipa "${{ steps.version.outputs.ipa }}"

      - name: Upload to TestFlight (internal testers via automatic distribution)
        if: github.event_name == 'push'
        run: |
          # changelog + skip_waiting together: pilot waits only until the build APPEARS in
          # App Store Connect, sets "What to Test", then skips the rest of the processing
          # wait. The internal group's automatic-distribution flag delivers the build once
          # Apple finishes processing — no group assignment is needed here.
          CHANGELOG="$(git log -1 --pretty=%s)"
          fastlane pilot upload \
            --ipa "${{ steps.version.outputs.ipa }}" \
            --api_key_path "$RUNNER_TEMP/asc/api_key.json" \
            --changelog "$CHANGELOG" \
            --skip_waiting_for_build_processing true

      - name: Upload to TestFlight and distribute to external testers
        if: github.event_name == 'release'
        env:
          RELEASE_NOTES: ${{ github.event.release.body }}
          EXTERNAL_GROUPS: ${{ vars.TESTFLIGHT_EXTERNAL_GROUPS || 'Beta' }}
        run: |
          if [ -z "$RELEASE_NOTES" ]; then
            echo "::error::Release body is empty — external distribution requires 'What to Test' text"
            exit 1
          fi
          # No skip_waiting here: adding the build to external groups requires the
          # processed build, so pilot must sit out the 5–15 min App Store Connect
          # processing. It then sets "What to Test", submits the first build of a new
          # version to Beta App Review, and adds the build to the group(s).
          fastlane pilot upload \
            --ipa "${{ steps.version.outputs.ipa }}" \
            --api_key_path "$RUNNER_TEMP/asc/api_key.json" \
            --changelog "$RELEASE_NOTES" \
            --distribute_external true \
            --groups "$EXTERNAL_GROUPS"

      - name: Attach IPA to the GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG" "${{ steps.version.outputs.ipa }}" --clobber

  testflight-macos:
    name: Cloud-signed macOS build → TestFlight
    needs: test
    # Same image as the iOS job — App Store uploads want the newest Xcode/SDKs, and one
    # image keeps both signing jobs on the same toolchain.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # build numbers derive from the commit count

      - name: Use the newest installed Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"

      # Same certificate-cap avoidance as the iOS job — see the comment there. Both jobs
      # share the restore-keys prefix, so either platform's keychain (each holding a
      # reusable Apple Development identity) unblocks the other.
      - name: Reuse the CI signing keychain across runs
        uses: actions/cache@v4
        with:
          path: ~/Library/Keychains/ci-signing.keychain-db
          key: ci-signing-keychain-${{ github.run_id }}-${{ github.run_attempt }}-macos
          restore-keys: ci-signing-keychain-

      - name: Activate the CI signing keychain
        run: |
          KEYCHAIN="$HOME/Library/Keychains/ci-signing.keychain-db"
          if [ ! -f "$KEYCHAIN" ]; then
            security create-keychain -p remsound-ci "$KEYCHAIN"
          fi
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p remsound-ci "$KEYCHAIN"
          # Non-interactive codesign access to keys restored from a previous run's cache.
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k remsound-ci "$KEYCHAIN" >/dev/null 2>&1 || true
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          security default-keychain -s "$KEYCHAIN"

      - name: Derive marketing version and build number
        id: version
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${TAG#v}"
            # Same two tag forms as the iOS job: vX.Y.Z bumps the marketing version
            # (Beta App Review), vX.Y.Z-bN re-releases the same version review-free.
            if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-b[0-9]+)?$ ]]; then
              echo "::error::Release tag must be vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-b<N> (got '$TAG')"
              exit 1
            fi
            KIND=1
            PKG="RemSound-macOS-$TAG.pkg"
            VERSION="${VERSION%%-*}"
          else
            VERSION=$(sed -n 's/^[[:space:]]*MARKETING_VERSION = \(.*\);$/\1/p' RemSound.xcodeproj/project.pbxproj | head -1)
            KIND=0
            PKG="RemSound-macOS-$VERSION-$(git rev-parse --short HEAD).pkg"
          fi
          # Same commit-count.kind.attempt scheme as the iOS job. CFBundleVersion
          # uniqueness is per platform, so the iOS and macOS builds of one commit
          # deliberately share a build number.
          BUILD="$(git rev-list --count HEAD).$KIND.${{ github.run_attempt }}"
          {
            echo "marketing=$VERSION"
            echo "build=$BUILD"
            echo "pkg=$PKG"
          } >> "$GITHUB_OUTPUT"

      - name: Write App Store Connect API key
        env:
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/asc"
          printf '%s' "$API_PRIVATE_KEY" > "$RUNNER_TEMP/asc/AuthKey.p8"
          jq -n --arg kid "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
                --arg iss "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}" \
                --arg key "$API_PRIVATE_KEY" \
            '{key_id: $kid, issuer_id: $iss, key: $key, duration: 1200, in_house: false}' \
            > "$RUNNER_TEMP/asc/api_key.json"

      - name: Archive (cloud signing — Apple signs with its cloud-managed certificate)
        run: |
          xcodebuild archive \
            -project RemSound.xcodeproj \
            -scheme RemSound-macOS \
            -destination 'generic/platform=macOS' \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/RemSound.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/asc/AuthKey.p8" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            MARKETING_VERSION="${{ steps.version.outputs.marketing }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build }}"

      - name: Export PKG
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>export</string>
            <key>signingStyle</key><string>automatic</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/RemSound.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/asc/AuthKey.p8" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}"
          cp "$RUNNER_TEMP"/export/*.pkg "${{ steps.version.outputs.pkg }}"

      - name: Upload to TestFlight (internal testers via automatic distribution)
        if: github.event_name == 'push'
        run: |
          CHANGELOG="$(git log -1 --pretty=%s)"
          fastlane pilot upload \
            --app_platform osx \
            --pkg "${{ steps.version.outputs.pkg }}" \
            --api_key_path "$RUNNER_TEMP/asc/api_key.json" \
            --changelog "$CHANGELOG" \
            --skip_waiting_for_build_processing true

      - name: Upload to TestFlight and distribute to external testers
        if: github.event_name == 'release'
        env:
          RELEASE_NOTES: ${{ github.event.release.body }}
          EXTERNAL_GROUPS: ${{ vars.TESTFLIGHT_EXTERNAL_GROUPS || 'Beta' }}
        run: |
          if [ -z "$RELEASE_NOTES" ]; then
            echo "::error::Release body is empty — external distribution requires 'What to Test' text"
            exit 1
          fi
          fastlane pilot upload \
            --app_platform osx \
            --pkg "${{ steps.version.outputs.pkg }}" \
            --api_key_path "$RUNNER_TEMP/asc/api_key.json" \
            --changelog "$RELEASE_NOTES" \
            --distribute_external true \
            --groups "$EXTERNAL_GROUPS"

      - name: Attach PKG to the GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG" "${{ steps.version.outputs.pkg }}" --clobber
