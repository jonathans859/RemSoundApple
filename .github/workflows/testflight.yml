name: TestFlight

# Every push to main builds a cloud-signed iOS IPA and a cloud-signed macOS PKG and
# uploads both to TestFlight; the internal tester group (set to automatic distribution in
# App Store Connect) receives them as soon as processing finishes, with the head commit
# subject as "What to Test". Publishing a GitHub Release (tag vX.Y.Z) additionally sets
# the release notes as "What to Test", distributes the builds to the external tester
# group(s), and attaches the IPA + PKG to the release. The first build of each marketing
# version goes through Beta App Review before external testers see it — per platform,
# and that wait is Apple-side and normal.
#
# Runner economics: the two signing jobs (macos-26, billed 10×) only ever archive, sign,
# upload with skip_waiting, and attach the release asset — none of them wait on App Store
# Connect processing. External distribution is the one step that needs the PROCESSED build
# (a 5–15 min wait), so it lives in a separate `distribute` job on ubuntu-latest (1×),
# which targets the already-uploaded builds by version + build number (no Xcode, no archive
# files). This keeps the expensive runners busy only while they are actually building.
#
# Both platforms share ONE App Store Connect app record (universal purchase): the iOS and
# macOS targets use the same bundle id com.jonathan859.remsound, and the app record must
# have the macOS platform added (App Store Connect → RemSound → Add Platform) before the
# first macOS upload. fastlane pilot disambiguates the platforms via --app_platform.
#
# Signing is Apple *cloud signing*: automatic signing + the App Store Connect API key
# (must be role Admin) via -allowProvisioningUpdates. Apple holds the distribution
# certificate's private key; no certificate, .p12, or profile exists in this repo or its
# secrets. Required secrets:
#   APPLE_TEAM_ID, APP_STORE_CONNECT_API_KEY_ID, APP_STORE_CONNECT_API_ISSUER_ID,
#   APP_STORE_CONNECT_API_PRIVATE_KEY
# Optional repository VARIABLE (Settings → Secrets and variables → Actions → Variables):
#   TESTFLIGHT_EXTERNAL_GROUPS — comma-separated external TestFlight group names that
#   releases are distributed to (defaults to "Beta"; must match App Store Connect exactly).

on:
  push:
    branches: [main]
    # Docs-only and CI-only pushes must not mint a TestFlight build. A push is skipped
    # only when EVERY changed file matches; anything mixing code and these still builds.
    # ".github/workflows/**" covers CI-only edits (e.g. a timeout tweak or a caching
    # change to this very file) that don't touch the app — those shouldn't ship a new
    # internal-tester build with no user-visible change.
    paths-ignore:
      - "**.md"
      - ".claude/**"
      - ".github/workflows/**"
      - "LICENSE"
      - ".gitignore"
  release:
    types: [published]

permissions:
  contents: write # gh release upload

# Serialize workflow runs: parallel pilot runs against the same app record + platform
# race App Store Connect processing, and ordered uploads keep TestFlight's build list
# sensible. The iOS and macOS jobs within one run may overlap — different platforms
# process independently.
concurrency:
  group: testflight-upload
  cancel-in-progress: false

jobs:
  test:
    name: RemSoundKit unit tests
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - name: Run tests
        run: swift test --package-path RemSoundKit

  testflight:
    name: Cloud-signed iOS build → TestFlight
    needs: test
    # Version + build number are published so the Ubuntu `distribute` job can target this
    # exact uploaded build by number, without a Mac runner or the archive files. The macOS
    # job computes identical values (same formula, same commit, same run attempt), so one
    # platform's outputs describe both builds.
    outputs:
      marketing: ${{ steps.version.outputs.marketing }}
      build: ${{ steps.version.outputs.build }}
    # App Store Connect rejects uploads not built with the iOS 26 SDK (Xcode 26+), so this
    # job must run on the macOS 26 image — NOT macos-15 (Xcode 16.4 / iOS 18.5 SDK). Only
    # uploads have the SDK floor; tests and unsigned CI stay on the older image.
    runs-on: macos-26
    # Cap well under GitHub's 6 h job ceiling: a signing job that raises a SecurityAgent GUI
    # prompt hangs a headless runner instead of failing, and now that the processing wait
    # lives on the Ubuntu distribute job this job only archives, signs, uploads (skip_waiting),
    # and attaches — 30 min is generous. (A v0.5.0 macOS run once idled the OLD in-job
    # distribute wait until GitHub's 6 h ceiling cancelled it — this cap makes that fail fast.)
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # build numbers derive from the commit count

      - name: Use the newest installed Xcode (iOS 26 SDK required for App Store uploads)
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"

      # xcodebuild's ARCHIVE step signs with an Apple Development identity (only the
      # export re-sign is cloud-managed distribution signing), and on a throwaway runner
      # -allowProvisioningUpdates mints a brand-new Development certificate every run —
      # until the account hits Apple's certificate cap (first hit 2026-07-11, v0.3.0).
      # Persisting ONE keychain across runs lets every later run reuse the same identity:
      # new certificates are only minted on a cold cache and when the year-long
      # certificate expires. The always-unique key + restore-keys prefix means each run
      # restores the newest keychain AND saves its (possibly updated) state for the next.
      # The fixed keychain password below only guards a Development-grade key inside this
      # repo's Actions cache — it cannot distribute anything; the distribution key never
      # leaves Apple.
      - name: Reuse the CI signing keychain across runs
        uses: actions/cache@v4
        with:
          path: ~/Library/Keychains/ci-signing.keychain-db
          key: ci-signing-keychain-${{ github.run_id }}-${{ github.run_attempt }}-ios
          restore-keys: ci-signing-keychain-

      # A RESTORED keychain arrives locked, and `security set-keychain-settings` on a
      # locked keychain pops a SecurityAgent GUI prompt that hangs a headless runner
      # forever (first hit 2026-07-11: both jobs wedged 4.6 h on the first cache
      # restore) — so unlock-keychain (non-interactive: -p errors instead of prompting)
      # must run FIRST, and the step carries a timeout with a fresh-keychain fallback.
      - name: Activate the CI signing keychain
        id: keychain
        timeout-minutes: 5
        continue-on-error: true
        run: |
          KEYCHAIN="$HOME/Library/Keychains/ci-signing.keychain-db"
          if [ ! -f "$KEYCHAIN" ]; then
            security create-keychain -p remsound-ci "$KEYCHAIN"
          fi
          security unlock-keychain -p remsound-ci "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          # Non-interactive codesign access to keys restored from a previous run's cache.
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k remsound-ci "$KEYCHAIN" >/dev/null 2>&1 || true
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          security default-keychain -s "$KEYCHAIN"
          echo "activated=true" >> "$GITHUB_OUTPUT"

      # Corrupt/unusable restored keychain: start over. Costs one freshly minted Apple
      # Development certificate (the thing the cache exists to avoid) — acceptable on
      # this rare path, and the re-saved cache makes the next run cheap again.
      - name: Recreate the signing keychain (restored one failed to activate)
        if: steps.keychain.outputs.activated != 'true'
        run: |
          KEYCHAIN="$HOME/Library/Keychains/ci-signing.keychain-db"
          rm -f "$KEYCHAIN"
          security create-keychain -p remsound-ci "$KEYCHAIN"
          security unlock-keychain -p remsound-ci "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          security default-keychain -s "$KEYCHAIN"

      - name: Derive marketing version and build number
        id: version
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${TAG#v}"
            # vX.Y.Z = NEW marketing version — its first build waits in Beta App Review
            # before external testers see it. vX.Y.Z-bN = re-release of the SAME
            # marketing version: external testers usually get it without a fresh review;
            # build-number uniqueness already comes from the commit count.
            if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-b[0-9]+)?$ ]]; then
              echo "::error::Release tag must be vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-b<N> (got '$TAG')"
              exit 1
            fi
            KIND=1
            IPA="RemSound-iOS-$TAG.ipa"
            VERSION="${VERSION%%-*}"
          else
            # Push build: ship whatever fallback version the pbxproj carries (the release
            # skill keeps it in sync with the next tag).
            VERSION=$(sed -n 's/^[[:space:]]*MARKETING_VERSION = \(.*\);$/\1/p' RemSound.xcodeproj/project.pbxproj | head -1)
            KIND=0
            IPA="RemSound-iOS-$VERSION-$(git rev-parse --short HEAD).ipa"
          fi
          # CFBundleVersion must be unique per marketing version and should only grow.
          # commit-count.kind.attempt: the commit count is monotonic on main, kind keeps
          # the push build and the release build of the SAME commit distinct (a release is
          # usually tagged on a commit that already produced a push build), and the run
          # attempt keeps a re-run unique when a previous attempt uploaded before failing.
          BUILD="$(git rev-list --count HEAD).$KIND.${{ github.run_attempt }}"
          {
            echo "marketing=$VERSION"
            echo "build=$BUILD"
            echo "ipa=$IPA"
          } >> "$GITHUB_OUTPUT"

      - name: Write App Store Connect API key
        env:
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/asc"
          printf '%s' "$API_PRIVATE_KEY" > "$RUNNER_TEMP/asc/AuthKey.p8"
          jq -n --arg kid "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
                --arg iss "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}" \
                --arg key "$API_PRIVATE_KEY" \
            '{key_id: $kid, issuer_id: $iss, key: $key, duration: 1200, in_house: false}' \
            > "$RUNNER_TEMP/asc/api_key.json"

      - name: Archive (cloud signing — Apple signs with its cloud-managed certificate)
        run: |
          xcodebuild archive \
            -project RemSound.xcodeproj \
            -scheme RemSound-iOS \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/RemSound.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/asc/AuthKey.p8" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            MARKETING_VERSION="${{ steps.version.outputs.marketing }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build }}"

      - name: Export IPA
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>export</string>
            <key>signingStyle</key><string>automatic</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/RemSound.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/asc/AuthKey.p8" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}"
          cp "$RUNNER_TEMP"/export/*.ipa "${{ steps.version.outputs.ipa }}"

      - name: Upload to TestFlight (internal testers via automatic distribution)
        if: github.event_name == 'push'
        run: |
          # changelog + skip_waiting together: pilot waits only until the build APPEARS in
          # App Store Connect, sets "What to Test", then skips the rest of the processing
          # wait. The internal group's automatic-distribution flag delivers the build once
          # Apple finishes processing — no group assignment is needed here.
          CHANGELOG="$(git log -1 --pretty=%s)"
          fastlane pilot upload \
            --ipa "${{ steps.version.outputs.ipa }}" \
            --api_key_path "$RUNNER_TEMP/asc/api_key.json" \
            --changelog "$CHANGELOG" \
            --skip_waiting_for_build_processing true

      # On a release, upload with skip_waiting exactly like the push path — the build only
      # has to APPEAR in App Store Connect here. External distribution needs the build
      # PROCESSED (a 5–15 min wait), and that wait is moved to the `distribute` job on a
      # 1× Ubuntu runner rather than idling this 10× macOS runner. The build still reaches
      # internal testers via automatic distribution as soon as processing finishes.
      - name: Upload to TestFlight (external distribution runs on the Ubuntu distribute job)
        if: github.event_name == 'release'
        env:
          RELEASE_NOTES: ${{ github.event.release.body }}
        run: |
          if [ -z "$RELEASE_NOTES" ]; then
            echo "::error::Release body is empty — 'What to Test' text is required"
            exit 1
          fi
          fastlane pilot upload \
            --ipa "${{ steps.version.outputs.ipa }}" \
            --api_key_path "$RUNNER_TEMP/asc/api_key.json" \
            --changelog "$RELEASE_NOTES" \
            --skip_waiting_for_build_processing true

      - name: Attach IPA to the GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG" "${{ steps.version.outputs.ipa }}" --clobber

  testflight-macos:
    name: Cloud-signed macOS build → TestFlight
    needs: test
    # Same image as the iOS job — App Store uploads want the newest Xcode/SDKs, and one
    # image keeps both signing jobs on the same toolchain.
    runs-on: macos-26
    # Same cap and reasoning as the iOS signing job.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # build numbers derive from the commit count

      - name: Use the newest installed Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"

      # Same certificate-cap avoidance as the iOS job — see the comment there. Both jobs
      # share the restore-keys prefix, so either platform's keychain (each holding a
      # reusable Apple Development identity) unblocks the other.
      - name: Reuse the CI signing keychain across runs
        uses: actions/cache@v4
        with:
          path: ~/Library/Keychains/ci-signing.keychain-db
          key: ci-signing-keychain-${{ github.run_id }}-${{ github.run_attempt }}-macos
          restore-keys: ci-signing-keychain-

      # Unlock BEFORE set-keychain-settings — same locked-restored-keychain hang as the
      # iOS job (see the comment there), same timeout + fresh-keychain fallback.
      - name: Activate the CI signing keychain
        id: keychain
        timeout-minutes: 5
        continue-on-error: true
        run: |
          KEYCHAIN="$HOME/Library/Keychains/ci-signing.keychain-db"
          if [ ! -f "$KEYCHAIN" ]; then
            security create-keychain -p remsound-ci "$KEYCHAIN"
          fi
          security unlock-keychain -p remsound-ci "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          # Non-interactive codesign access to keys restored from a previous run's cache.
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k remsound-ci "$KEYCHAIN" >/dev/null 2>&1 || true
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          security default-keychain -s "$KEYCHAIN"
          echo "activated=true" >> "$GITHUB_OUTPUT"

      - name: Recreate the signing keychain (restored one failed to activate)
        if: steps.keychain.outputs.activated != 'true'
        run: |
          KEYCHAIN="$HOME/Library/Keychains/ci-signing.keychain-db"
          rm -f "$KEYCHAIN"
          security create-keychain -p remsound-ci "$KEYCHAIN"
          security unlock-keychain -p remsound-ci "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          security default-keychain -s "$KEYCHAIN"

      - name: Derive marketing version and build number
        id: version
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${TAG#v}"
            # Same two tag forms as the iOS job: vX.Y.Z bumps the marketing version
            # (Beta App Review), vX.Y.Z-bN re-releases the same version review-free.
            if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-b[0-9]+)?$ ]]; then
              echo "::error::Release tag must be vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-b<N> (got '$TAG')"
              exit 1
            fi
            KIND=1
            PKG="RemSound-macOS-$TAG.pkg"
            VERSION="${VERSION%%-*}"
          else
            VERSION=$(sed -n 's/^[[:space:]]*MARKETING_VERSION = \(.*\);$/\1/p' RemSound.xcodeproj/project.pbxproj | head -1)
            KIND=0
            PKG="RemSound-macOS-$VERSION-$(git rev-parse --short HEAD).pkg"
          fi
          # Same commit-count.kind.attempt scheme as the iOS job. CFBundleVersion
          # uniqueness is per platform, so the iOS and macOS builds of one commit
          # deliberately share a build number.
          BUILD="$(git rev-list --count HEAD).$KIND.${{ github.run_attempt }}"
          {
            echo "marketing=$VERSION"
            echo "build=$BUILD"
            echo "pkg=$PKG"
          } >> "$GITHUB_OUTPUT"

      - name: Write App Store Connect API key
        env:
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/asc"
          printf '%s' "$API_PRIVATE_KEY" > "$RUNNER_TEMP/asc/AuthKey.p8"
          jq -n --arg kid "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
                --arg iss "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}" \
                --arg key "$API_PRIVATE_KEY" \
            '{key_id: $kid, issuer_id: $iss, key: $key, duration: 1200, in_house: false}' \
            > "$RUNNER_TEMP/asc/api_key.json"

      # Archived with an AD-HOC signature, unlike the iOS job — real signing happens at
      # export below. Two constraints have to be satisfied at once here, and only ad-hoc
      # signing satisfies both:
      #
      # 1. The archive must NOT need a development provisioning profile. Automatic signing
      #    signs the archive with an Apple *Development* identity, which needs a matching
      #    profile. An iOS development profile can be issued to a team with no registered
      #    devices; a **Mac** one cannot. So from the moment the app gained an App-ID-level
      #    capability (iCloud key-value store, 2026-07-20) the macOS job died with:
      #      error: Your team has no devices from which to generate a provisioning profile.
      #      error: No profiles for 'com.jonathan859.remsound' were found … Mac App
      #             Development …
      #    Development happens on Windows; there is no Mac to register, so that path is a
      #    dead end rather than a missing setup step.
      #
      # 2. The archive MUST still carry the entitlements. Archiving with
      #    CODE_SIGNING_ALLOWED=NO cleared the first problem but created a worse one: an
      #    unsigned binary has no entitlements for the export re-sign to carry over, so the
      #    upload was rejected by App Store Connect with
      #      App sandbox not enabled … must include "com.apple.security.app-sandbox" (90296)
      #    and the sandbox is mandatory for Mac App Store / TestFlight builds.
      #
      # An ad-hoc signature ("-") embeds the entitlements without consulting Apple for a
      # certificate or a profile. The export step then re-signs with the cloud-managed
      # *distribution* certificate and a Mac App Store profile — which is not device-bound —
      # carrying those entitlements through.
      - name: Archive (ad-hoc signed — export does the cloud signing)
        run: |
          xcodebuild archive \
            -project RemSound.xcodeproj \
            -scheme RemSound-macOS \
            -destination 'generic/platform=macOS' \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/RemSound.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            MARKETING_VERSION="${{ steps.version.outputs.marketing }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build }}"

      # Guard the trap above: if the archived binary ever loses the sandbox entitlement
      # again, fail here with a clear message instead of 12 minutes later inside altool's
      # 90296 rejection.
      - name: Verify the archived app kept its entitlements
        run: |
          APP="$RUNNER_TEMP/RemSound.xcarchive/Products/Applications/RemSound.app"
          codesign -d --entitlements :- "$APP" > "$RUNNER_TEMP/archived-entitlements.plist"
          cat "$RUNNER_TEMP/archived-entitlements.plist"
          for key in com.apple.security.app-sandbox \
                     com.apple.developer.ubiquity-kvstore-identifier; do
            if ! grep -q "$key" "$RUNNER_TEMP/archived-entitlements.plist"; then
              echo "::error::Archived app is missing the $key entitlement — the export would upload a build App Store Connect rejects."
              exit 1
            fi
          done

      - name: Export PKG
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>export</string>
            <key>signingStyle</key><string>automatic</string>
            <key>teamID</key><string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/RemSound.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/asc/AuthKey.p8" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}"
          cp "$RUNNER_TEMP"/export/*.pkg "${{ steps.version.outputs.pkg }}"

      - name: Upload to TestFlight (internal testers via automatic distribution)
        if: github.event_name == 'push'
        run: |
          CHANGELOG="$(git log -1 --pretty=%s)"
          fastlane pilot upload \
            --app_platform osx \
            --pkg "${{ steps.version.outputs.pkg }}" \
            --api_key_path "$RUNNER_TEMP/asc/api_key.json" \
            --changelog "$CHANGELOG" \
            --skip_waiting_for_build_processing true

      # Same split as the iOS job: upload-only here (skip_waiting), external distribution
      # on the Ubuntu `distribute` job so the processing wait does not idle a 10× runner.
      - name: Upload to TestFlight (external distribution runs on the Ubuntu distribute job)
        if: github.event_name == 'release'
        env:
          RELEASE_NOTES: ${{ github.event.release.body }}
        run: |
          if [ -z "$RELEASE_NOTES" ]; then
            echo "::error::Release body is empty — 'What to Test' text is required"
            exit 1
          fi
          fastlane pilot upload \
            --app_platform osx \
            --pkg "${{ steps.version.outputs.pkg }}" \
            --api_key_path "$RUNNER_TEMP/asc/api_key.json" \
            --changelog "$RELEASE_NOTES" \
            --skip_waiting_for_build_processing true

      - name: Attach PKG to the GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG" "${{ steps.version.outputs.pkg }}" --clobber

  # External distribution — the ONLY part that must wait out App Store Connect's 5–15 min
  # build processing, moved off the 10× macOS runners onto a 1× Ubuntu runner. It needs no
  # Xcode and no archive files: `pilot distribute` targets the builds the two signing jobs
  # already uploaded, by marketing version + build number (published as their outputs), and
  # adds them to the external tester group(s). Runs only for releases; the push path reaches
  # internal testers straight from the signing jobs' skip_waiting upload.
  distribute:
    name: Distribute to external testers
    needs: [testflight, testflight-macos]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    # Hard ceiling. The retry loop below already bounds the wait (~90 min of polling), but a
    # job-level cap guarantees a wedged pilot process can never run to GitHub's 6 h limit —
    # cheap here (1× Ubuntu), but the discipline the signing jobs also follow.
    timeout-minutes: 105
    env:
      RELEASE_NOTES: ${{ github.event.release.body }}
      EXTERNAL_GROUPS: ${{ vars.TESTFLIGHT_EXTERNAL_GROUPS || 'Beta' }}
      MARKETING: ${{ needs.testflight.outputs.marketing }}
      BUILD: ${{ needs.testflight.outputs.build }}
    steps:
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install fastlane
        run: gem install fastlane --no-document

      - name: Write App Store Connect API key
        env:
          API_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
        run: |
          jq -n --arg kid "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
                --arg iss "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}" \
                --arg key "$API_PRIVATE_KEY" \
            '{key_id: $kid, issuer_id: $iss, key: $key, duration: 1200, in_house: false}' \
            > api_key.json

      - name: Distribute both platforms to external testers
        run: |
          if [ -z "$RELEASE_NOTES" ]; then
            echo "::error::Release body is empty — external distribution requires 'What to Test' text"
            exit 1
          fi
          # distribute_only: no ipa/pkg, just point pilot at the already-uploaded build by
          # version + number. Each platform is retried because a build uploaded minutes ago
          # may still be processing in App Store Connect — pilot fails that race rather than
          # waiting, so this is where the processing wait actually happens (now on 1×).
          distribute() { # $1 = ios | osx
            fastlane pilot distribute \
              --app_identifier com.jonathan859.remsound \
              --app_platform "$1" \
              --app_version "$MARKETING" \
              --build_number "$BUILD" \
              --distribute_external true \
              --groups "$EXTERNAL_GROUPS" \
              --changelog "$RELEASE_NOTES" \
              --notify_external_testers true \
              --api_key_path api_key.json
          }
          # 30 attempts × 180s ≈ 90 min of polling — sized for macOS processing, which is far
          # slower than iOS (a v0.5.0 macOS build took over an hour). This is why the wait was
          # worth moving off the 10× runner: on 1× Ubuntu, idling ~90 min is cheap. The job
          # timeout-minutes above is the hard backstop if pilot wedges instead of failing.
          for platform in ios osx; do
            n=0
            until distribute "$platform"; do
              n=$((n + 1))
              if [ "$n" -ge 30 ]; then
                echo "::error::External distribution for $platform failed after $n attempts (~90 min) — the build may still be processing; rerun this job once App Store Connect finishes."
                exit 1
              fi
              echo "Build not ready for $platform (attempt $n) — waiting 180s for App Store Connect processing"
              sleep 180
            done
          done
